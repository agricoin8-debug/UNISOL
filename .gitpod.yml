# This file is a configuration file for Gitpod
# https://www.gitpod.io/docs/config-gitpod-file

image: ""

tasks:
  - init: npm install
    command: npm run dev

ports:
  - port: 3000
    onOpen: open-browser

vscode:
  extensions:
    - dbaeumer.vscode-eslint
    - esbenp.prettier-vscode
    - bradlc.vscode-tailwindcss

github:
  prebuilds:
    addComment: false
    addBadge: true
    addLabel: true
