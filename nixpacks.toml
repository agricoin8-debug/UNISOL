[phases.setup]
 nixPkgs = ["nodejs_20", "openssl", "python3", "gnumake", "gcc"]

[phases.install]
 cmds = ["cd backend && npm ci", "cd backend && npx prisma generate", "cd frontend && npm ci"]

[phases.build]
 cmds = ["cd frontend && npm run build", "cd backend && npm run build"]

[start]
 cmd = "cd backend && npx prisma migrate deploy && node dist/index.js"